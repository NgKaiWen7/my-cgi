<section class="page-head">
    <div>
        <h1>{{form_title}}</h1>
        <p>Enter the record details below.</p>
    </div>
    <a class="button secondary" href="?">Back</a>
</section>

<form class="form" method="post" action="">
    <input type="hidden" name="action" value="{{submit_action}}">
    <input type="hidden" name="id" value="{{id}}">

    <label>
        Title
        <input name="title" value="{{title_value}}" required>
    </label>

    <label>
        Amount
        <input name="amount" type="number" step="0.01" value="{{amount_value}}">
    </label>

    <label>
        Visit Date
        <input name="visit_date" type="date" value="{{visit_date_value}}">
    </label>

    <label>
        Visit Time
        <input name="visit_time" type="time" value="{{visit_time_value}}">
    </label>

    <label>
        Category
        <input name="category" value="{{category_value}}">
    </label>

    <label>
        Tags
        <input name="tags" value="{{tags_value}}">
    </label>

    <label>
        Color
        <input name="color" type="color" value="{{color_value}}">
    </label>

    <label class="wide">
        Address
        <textarea name="address" rows="3">{{address_value}}</textarea>
    </label>

    <label class="wide">
        Notes
        <textarea name="notes" rows="5">{{notes_value}}</textarea>
    </label>

    <div class="form-actions">
        <button class="button" type="submit">{{submit_label}}</button>
    </div>
</form>
