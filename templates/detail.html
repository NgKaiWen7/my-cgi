<section class="page-head">
    <div>
        <h1>{{title_value}}</h1>
        <p>Record #{{id}}</p>
    </div>
    <div class="button-row">
        <a class="button secondary" href="?">Back</a>
        <a class="button" href="?action=edit&id={{id}}">Edit</a>
    </div>
</section>

<dl class="details">
    <dt>Created</dt><dd>{{created_at_value}}</dd>
    <dt>Amount</dt><dd>{{amount_value}}</dd>
    <dt>Visit Date</dt><dd>{{visit_date_value}}</dd>
    <dt>Visit Time</dt><dd>{{visit_time_value}}</dd>
    <dt>Category</dt><dd>{{category_value}}</dd>
    <dt>Tags</dt><dd>{{tags_value}}</dd>
    <dt>Color</dt><dd><span class="swatch" style="background: {{color_value}}"></span>{{color_value}}</dd>
    <dt>Address</dt><dd>{{address_value}}</dd>
    <dt>Notes</dt><dd>{{notes_value}}</dd>
</dl>
